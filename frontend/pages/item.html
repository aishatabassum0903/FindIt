<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Details — FindIt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0A1628; --blue:#1B4FFF; --teal:#00C6B3; --amber:#FFB830;
      --white:#FFFFFF; --gray-50:#F7F9FC; --gray-100:#EEF2F8;
      --gray-200:#D8E0ED; --gray-400:#8A97B0; --gray-600:#4A5568;
      --shadow-md:0 8px 32px rgba(10,22,40,0.10);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Outfit',sans-serif;background:var(--gray-50);color:var(--navy);-webkit-font-smoothing:antialiased;}
    a{text-decoration:none;color:inherit;}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:72px;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(10,22,40,0.06);}
    .nav-logo{display:flex;align-items:center;gap:10px;font-family:'Instrument Serif',serif;font-size:24px;color:var(--navy);}
    .nav-logo-icon{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;}
    .nav-logo-icon svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2.5;stroke-linecap:round;}
    .nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
    .nav-links a{padding:7px 15px;border-radius:8px;font-size:14px;font-weight:500;color:var(--gray-600);transition:all 0.18s;}
    .nav-links a:hover{background:var(--gray-50);color:var(--navy);}
    .nav-cta{display:flex;gap:10px;}
    .btn-outline{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;color:var(--navy);border:1.5px solid var(--gray-200);background:white;transition:all 0.18s;}
    .btn-outline:hover{border-color:var(--blue);color:var(--blue);}
    .btn-primary{padding:8px 20px;border-radius:8px;font-size:14px;font-weight:600;color:white;background:var(--blue);border:none;box-shadow:0 4px 12px rgba(27,79,255,0.28);}

    /* BREADCRUMB */
    .breadcrumb-bar{background:white;border-bottom:1px solid var(--gray-200);padding:14px 48px;}
    .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-400);max-width:1200px;margin:0 auto;}
    .breadcrumb a{color:var(--gray-400);transition:color 0.18s;}
    .breadcrumb a:hover{color:var(--blue);}
    .breadcrumb svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}

    /* MAIN */
    .item-layout{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 380px;gap:32px;padding:40px 48px 80px;}

    /* LEFT */
    .item-left{}

    /* IMAGE */
    .img-wrapper{border-radius:24px;overflow:hidden;border:1.5px solid var(--gray-200);margin-bottom:24px;position:relative;}
    .item-img-main{width:100%;max-height:480px;object-fit:cover;display:block;}
    .img-placeholder{width:100%;height:360px;background:linear-gradient(135deg,var(--gray-50),var(--gray-100));display:flex;align-items:center;justify-content:center;font-size:100px;}

    /* INFO CARDS */
    .info-card{background:white;border-radius:20px;border:1.5px solid var(--gray-200);padding:24px;margin-bottom:20px;}
    .info-card-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .info-card-title svg{width:17px;height:17px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;}
    .desc-text{font-size:14px;color:var(--gray-600);line-height:1.8;}
    .attr-chips{display:flex;flex-wrap:wrap;gap:8px;}
    .attr-chip{padding:6px 14px;border-radius:100px;font-size:13px;font-weight:500;background:var(--gray-50);border:1.5px solid var(--gray-200);color:var(--navy);}

    /* MATCHES */
    .match-item{display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;cursor:pointer;transition:all 0.18s;border:1.5px solid var(--gray-200);margin-bottom:10px;}
    .match-item:hover{border-color:var(--blue);background:#F0F7FF;}
    .match-img{width:56px;height:56px;border-radius:12px;object-fit:cover;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
    .match-info{flex:1;min-width:0;}
    .match-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .match-meta{font-size:12px;color:var(--gray-400);margin-top:2px;}
    .match-score-badge{text-align:right;flex-shrink:0;}
    .match-score-val{font-size:20px;font-weight:800;}
    .match-score-lab{font-size:11px;color:var(--gray-400);}

    /* RIGHT SIDEBAR */
    .item-sidebar{position:sticky;top:92px;}
    .sidebar-card{background:white;border-radius:24px;border:1.5px solid var(--gray-200);padding:28px;box-shadow:var(--shadow-md);margin-bottom:16px;}

    .item-badges{display:flex;gap:8px;margin-bottom:18px;}
    .item-badge{padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
    .badge-missing{background:#FEE2E2;color:#991B1B;}
    .badge-recovered{background:#D1FAE5;color:#065F46;}
    .badge-active{background:#DBEAFE;color:#1D4ED8;}
    .badge-closed{background:var(--gray-100);color:var(--gray-600);}

    .item-title-main{font-family:'Instrument Serif',serif;font-size:26px;color:var(--navy);line-height:1.2;margin-bottom:20px;letter-spacing:-0.3px;}

    .detail-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
    .detail-row{display:flex;align-items:center;gap:10px;font-size:14px;}
    .detail-row svg{width:16px;height:16px;fill:none;stroke:var(--gray-400);stroke-width:2;flex-shrink:0;}
    .detail-label{color:var(--gray-400);width:70px;flex-shrink:0;}
    .detail-value{font-weight:600;color:var(--navy);}

    .btn-claim{width:100%;padding:14px;border-radius:14px;background:var(--blue);color:white;border:none;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(27,79,255,0.3);display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
    .btn-claim:hover{background:#1240E0;transform:translateY(-1px);}
    .btn-claim svg{width:17px;height:17px;fill:none;stroke:white;stroke-width:2.5;}
    .btn-claim-amber{background:var(--amber);color:var(--navy);box-shadow:0 4px 16px rgba(255,184,48,0.3);}
    .btn-claim-amber:hover{background:#F0A800;}
    .btn-share{width:100%;padding:11px;border-radius:12px;background:var(--gray-50);border:1.5px solid var(--gray-200);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;transition:all 0.18s;}
    .btn-share:hover{border-color:var(--navy);color:var(--navy);}
    .owner-notice{background:var(--gray-50);border-radius:12px;padding:16px;text-align:center;font-size:13px;color:var(--gray-600);}
    .resolved-notice{background:#D1FAE5;border-radius:12px;padding:16px;text-align:center;font-size:13px;color:#065F46;font-weight:600;}

    /* CLAIM MODAL */
    .modal-backdrop{position:fixed;inset:0;background:rgba(10,22,40,0.5);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .modal{background:white;border-radius:24px;padding:36px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(10,22,40,0.2);animation:slideUp 0.3s ease;max-height:90vh;overflow-y:auto;}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    .modal-title{font-family:'Instrument Serif',serif;font-size:24px;color:var(--navy);margin-bottom:8px;}
    .modal-sub{font-size:14px;color:var(--gray-400);margin-bottom:24px;line-height:1.6;}
    .form-label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:7px;}
    .form-control{width:100%;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--navy);background:white;outline:none;transition:all 0.2s;resize:vertical;min-height:110px;}
    .form-control:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,79,255,0.08);}
    .hotspot-hints{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:12px;padding:14px;margin-bottom:20px;}
    .hotspot-hints-title{font-size:12px;font-weight:700;color:#92400E;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
    .hotspot-hint-item{font-size:13px;color:#78350F;margin:4px 0;display:flex;align-items:center;gap:6px;}
    .modal-actions{display:flex;gap:10px;margin-top:20px;}
    .btn-modal-cancel{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--gray-200);background:white;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:var(--gray-600);cursor:pointer;}
    .btn-modal-submit{flex:2;padding:12px;border-radius:12px;background:var(--blue);color:white;border:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(27,79,255,0.3);}
    .btn-modal-submit:disabled{opacity:0.5;cursor:not-allowed;}

    /* SPINNER */
    .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    #toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;}
    @keyframes slideIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}

    @media(max-width:1024px){.item-layout{grid-template-columns:1fr;padding:24px 20px 48px;}.item-sidebar{position:static;}.breadcrumb-bar{padding:14px 20px;}}
    @media(max-width:768px){.navbar{padding:0 20px;}.nav-links{display:none;}}
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="../index.html" class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
    </div>
    FindIt
  </a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="browse.html">Browse</a></li>
    <li><a href="report.html">Report Item</a></li>
  </ul>
  <div class="nav-cta" id="nav-cta">
    <a href="login.html" class="btn-outline">Sign In</a>
    <a href="register.html" class="btn-primary">Get Started</a>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb-bar">
  <div class="breadcrumb">
    <a href="../index.html">Home</a>
    <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    <a href="browse.html">Browse</a>
    <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    <span id="breadcrumb-title">Item Details</span>
  </div>
</div>

<!-- ITEM CONTENT -->
<div id="item-content">
  <div class="item-layout">
    <div>
      <div class="skeleton" style="height:400px;border-radius:24px;margin-bottom:24px;"></div>
      <div class="skeleton" style="height:120px;border-radius:20px;"></div>
    </div>
    <div>
      <div class="skeleton" style="height:400px;border-radius:24px;"></div>
    </div>
  </div>
</div>

<!-- CLAIM MODAL -->
<div id="claim-modal" style="display:none;">
  <div class="modal-backdrop" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Submit a Claim</div>
      <div class="modal-sub">Describe how you know this item belongs to you. Be specific — mention unique details, where you lost it, and anything that identifies it as yours.</div>
      <div id="hotspot-hints-container"></div>
      <div style="margin-bottom:4px;">
        <label class="form-label">Your Description</label>
        <textarea id="claim-desc" class="form-control" placeholder="e.g. This is my backpack, I lost it on Tuesday near the library. It has a small keychain on the left zip and my name written inside..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-modal-submit" id="claim-btn" onclick="submitClaim()">Submit Claim</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/imagemapper.js"></script>
<script>
  const itemId = new URLSearchParams(window.location.search).get('id');
  if (!itemId) window.location.href = 'browse.html';

  let currentItem = null;
  let mapper = null;

  function getCatIcon(c) {
    return {Electronics:'💻',Bags:'👜',Clothing:'👔',Documents:'📋',Accessories:'💍',Sports:'🏸',Books:'📖',Others:'📦'}[c]||'📦';
  }

  async function loadItem() {
    try {
      const item = await Items.getById(itemId);
      currentItem = item;
      renderItem(item);
      loadMatches(itemId);
      document.getElementById('breadcrumb-title').textContent = item.title;
      document.title = item.title + ' — FindIt';
    } catch(e) {
      document.getElementById('item-content').innerHTML = `
        <div style="text-align:center;padding:100px 20px;">
          <div style="font-size:64px;margin-bottom:16px;">❌</div>
          <h3 style="font-size:22px;font-weight:700;margin-bottom:8px;">Item not found</h3>
          <p style="color:var(--gray-400);margin-bottom:20px;">This item may have been removed.</p>
          <a href="browse.html" style="padding:12px 28px;background:var(--blue);color:white;border-radius:12px;font-weight:600;">Browse Items</a>
        </div>`;
    }
  }

  function renderItem(item) {
    const user     = getCurrentUser();
    const isOwner  = user && item.postedBy === user.id;
    const canClaim = user && !isOwner;
    const typeLabel  = item.type === 'lost' ? 'Missing' : 'Recovered';
    const typeBadge  = item.type === 'lost' ? 'badge-missing' : 'badge-recovered';
    const statusBadge = item.status === 'resolved' ? 'badge-closed' : 'badge-active';
    const statusLabel = item.status === 'resolved' ? 'Closed' : 'Active';

    document.getElementById('item-content').innerHTML = `
      <div class="item-layout">
        <div class="item-left">
          <!-- IMAGE -->
          <div class="img-wrapper" id="img-wrapper">
            ${item.imageUrl
              ? `<img id="item-img" class="item-img-main" src="${item.imageUrl}" alt="${item.title}">`
              : `<div class="img-placeholder">${getCatIcon(item.category)}</div>`}
          </div>
          <div id="hotspots-legend"></div>

          <!-- DESCRIPTION -->
          ${item.description ? `
            <div class="info-card">
              <div class="info-card-title">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Description
              </div>
              <p class="desc-text">${item.description}</p>
            </div>` : ''}

          <!-- ATTRIBUTES -->
          ${(item.color||item.brand||item.size) ? `
            <div class="info-card">
              <div class="info-card-title">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Attributes
              </div>
              <div class="attr-chips">
                ${item.color ? `<span class="attr-chip">🎨 ${item.color}</span>` : ''}
                ${item.brand ? `<span class="attr-chip">🏷️ ${item.brand}</span>` : ''}
                ${item.size  ? `<span class="attr-chip">📏 ${item.size}</span>`  : ''}
              </div>
            </div>` : ''}

          <!-- MATCHES -->
          <div id="matches-section"></div>
        </div>

        <!-- SIDEBAR -->
        <div class="item-sidebar">
          <div class="sidebar-card">
            <div class="item-badges">
              <span class="item-badge ${typeBadge}">${typeLabel}</span>
              <span class="item-badge ${statusBadge}">${statusLabel}</span>
            </div>
            <h1 class="item-title-main">${item.title}</h1>
            <div class="detail-list">
              <div class="detail-row">
                <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                <span class="detail-label">Category</span>
                <span class="detail-value">${item.category}</span>
              </div>
              <div class="detail-row">
                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span class="detail-label">Location</span>
                <span class="detail-value">${item.location}</span>
              </div>
              <div class="detail-row">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="detail-label">Date</span>
                <span class="detail-value">${new Date(item.date).toLocaleDateString()}</span>
              </div>
              ${item.posterName ? `
                <div class="detail-row">
                  <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  <span class="detail-label">Posted by</span>
                  <span class="detail-value">${item.posterName}</span>
                </div>` : ''}
              ${item.hotspots&&item.hotspots.length ? `
                <div class="detail-row">
                  <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <span class="detail-label">Feature pins</span>
                  <span class="detail-value" style="color:var(--amber);">${item.hotspots.length} marked</span>
                </div>` : ''}
            </div>

            ${item.status === 'resolved'
              ? `<div class="resolved-notice">✅ This item has been resolved!</div>`
              : isOwner
                ? `<div class="owner-notice">This is your posted item.<br><a href="dashboard.html" style="color:var(--blue);font-weight:600;">View in Dashboard →</a></div>`
                : canClaim
                  ? `<button class="btn-claim ${item.type==='found'?'':'btn-claim-amber'}" onclick="openClaimModal()">
                      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                      ${item.type==='found' ? 'This Belongs to Me' : 'I Found This Item'}
                    </button>`
                  : `<a href="login.html" class="btn-claim" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:10px;">
                      Sign in to Submit a Claim
                    </a>`
            }

            <button class="btn-share" onclick="navigator.clipboard.writeText(window.location.href);showToast('Link copied!','success')">
              🔗 Share this item
            </button>
          </div>
        </div>
      </div>
    `;

    // Load image mapper in read-only mode
    if (item.imageUrl && item.hotspots && item.hotspots.length > 0) {
      const img = document.getElementById('item-img');
      if (img) {
        img.onload = () => {
          mapper = new ImageMapper('img-wrapper', img, true);
          mapper.loadPins(item.hotspots.map((h,i) => ({...h, id:i+1})));
          document.getElementById('hotspots-legend').innerHTML = mapper.getLegendHTML();
        };
      }
    }
  }

  async function loadMatches(itemId) {
    try {
      const user = getCurrentUser();
      if (!user) return;
      const data = await Matches.getForItem(itemId);
      if (!data.matches || !data.matches.length) return;

      document.getElementById('matches-section').innerHTML = `
        <div class="info-card">
          <div class="info-card-title">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            AI Matched Items
          </div>
          ${data.matches.slice(0,4).map(m => `
            <div class="match-item" onclick="window.location='item.html?id=${m.item._id}'">
              <div class="match-img">${getCatIcon(m.item.category)}</div>
              <div class="match-info">
                <div class="match-title">${m.item.title}</div>
                <div class="match-meta">📍 ${m.item.location}</div>
              </div>
              <div class="match-score-badge">
                <div class="match-score-val" style="color:${m.score>0.7?'#10B981':m.score>0.5?'#F59E0B':'#8A97B0'};">${Math.round(m.score*100)}%</div>
                <div class="match-score-lab">match</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } catch(e) {}
  }

  function openClaimModal() {
    if (!getCurrentUser()) { window.location.href = 'login.html'; return; }
    document.getElementById('claim-modal').style.display = 'flex';
    if (currentItem && currentItem.hotspots && currentItem.hotspots.length) {
      document.getElementById('hotspot-hints-container').innerHTML = `
        <div class="hotspot-hints">
          <div class="hotspot-hints-title">💡 Mention these features to boost your claim</div>
          ${currentItem.hotspots.map((h,i) => `
            <div class="hotspot-hint-item">📌 ${i+1}. ${h.label}</div>
          `).join('')}
        </div>
      `;
    }
  }

  function closeModal() { document.getElementById('claim-modal').style.display = 'none'; }

  async function submitClaim() {
    const desc = document.getElementById('claim-desc').value.trim();
    if (!desc) { showToast('Please describe how you identify this item', 'error'); return; }
    const btn = document.getElementById('claim-btn');
    btn.disabled = true; btn.innerHTML = `<span class="spinner" style="display:inline-block;"></span> Submitting...`;
    try {
      const data = await Claims.submit({ itemId, description: desc });
      closeModal();
      const msg = data.hotspotMatches > 0
        ? `Claim submitted! ${data.hotspotMatches} feature(s) matched ✅`
        : 'Claim submitted! The owner will be notified.';
      showToast(msg, 'success');
    } catch(err) {
      showToast(err.message || 'Failed to submit claim', 'error');
      btn.disabled = false; btn.textContent = 'Submit Claim';
    }
  }

  // Navbar
  const user = getCurrentUser();
  if (user) {
    document.getElementById('nav-cta').innerHTML = `
      <a href="dashboard.html" class="btn-outline">Dashboard</a>
      <a href="report.html" class="btn-primary">+ Report Item</a>
    `;
  }

  loadItem();
</script>
</body>
</html>
